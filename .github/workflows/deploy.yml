name: Desplegar en GitHub Pages

# Se ejecuta automáticamente en cada push a main y también permite
# lanzarlo a mano desde la pestaña Actions (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el despliegue oficial de GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez. No cancela uno en curso para no dejar
# el sitio a medio publicar.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 1) Compila el sitio con Vite y sube el resultado (dist/) como artefacto.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar con Vite
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto del sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # 2) Publica el artefacto en GitHub Pages.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
